<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bing Bong</title>
    <!-- Adaptive SVG Favicon -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cstyle%3Epath %7B fill: %231f2328; %7D @media (prefers-color-scheme: dark) %7B path %7B fill: %23c9d1d9; %7D %7D%3C/style%3E%3Cpath d='M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z'/%3E%3C/svg%3E">
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --hover: #21262d; --border: #30363d;
            --text: #c9d1d9; --sub: #8b949e; --primary: #58a6ff; --success: #238636;
            --sz: 32px;
        }
        body.light-mode {
            --bg: #f6f8fa; --surface: #ffffff; --hover: #f3f4f6; --border: #d0d7de;
            --text: #1f2328; --sub: #656d76; --primary: #0969da; --success: #1a7f37;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; transition: background 0.2s;
        }
        .container {
            background: var(--surface); padding: 2.2rem; border-radius: 12px; border: 1px solid var(--border);
            width: 90%; max-width: 480px; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        header, .controls, .playback-group { display: flex; justify-content: space-between; align-items: center; }
        header { align-items: flex-start; margin-bottom: 2rem; }
        .header-title h1 { margin: 0; font-size: 1.5rem; }
        .header-title p { margin: 4px 0 0; font-size: 0.8rem; color: var(--sub); }
        .theme-toggle { 
            cursor: pointer; padding: 8px; border-radius: 6px; border: 1px solid var(--border); 
            background: var(--surface); color: var(--text); 
        }
        .labels { display: flex; justify-content: space-around; padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 2.5rem; }
        .note-name { font-size: 16px; font-weight: 700; color: var(--sub); width: 60px; text-align: center; }
        .note-name.highlight { color: var(--primary); transform: scale(1.2); transition: 0.2s; }
        .sequencer { display: flex; justify-content: space-around; margin-bottom: 3rem; }
        .channel { display: flex; flex-direction: column; align-items: center; gap: 24px; transition: opacity 0.2s; }
        .channel.muted { opacity: 0.25; }
        .slider-wrap { height: 160px; width: var(--sz); display: flex; align-items: center; justify-content: center; position: relative; }
        .pitch-slider { 
            -webkit-appearance: none; width: 140px; height: 6px; background: var(--border); 
            border-radius: 10px; transform: rotate(-90deg); cursor: pointer; outline: none; 
        }
        .pitch-slider::-webkit-slider-thumb { 
            -webkit-appearance: none; width: var(--sz); height: var(--sz); 
            background: var(--primary); border-radius: 50%; cursor: pointer; border: none;
        }
        .pitch-slider::-moz-range-thumb { width: var(--sz); height: var(--sz); background: var(--primary); border-radius: 50%; cursor: pointer; border: none; }
        .chk-wrap { cursor: pointer; width: var(--sz); height: var(--sz); display: block; position: relative; }
        .chk-wrap input { display: none; }
        .chk-icon { color: var(--sub); width: 100%; height: 100%; fill: currentColor; }
        .chk-wrap input:checked + .chk-icon { color: var(--primary); }
        .controls { gap: 40px; }
        .playback-group { gap: 8px; flex: 1; }
        button { 
            padding: 10px 16px; border: 1px solid var(--border); border-radius: 6px; 
            font-weight: 500; cursor: pointer; background: var(--hover); color: var(--text); 
            display: flex; align-items: center; gap: 8px; font-size: 0.9rem;
        }
        .btn-play { background: var(--success); color: #fff; border: none; flex: 1; }
        .btn-stop { flex: 1; }
        .btn-export { color: var(--primary); min-width: 110px; }
        footer { margin-top: 1.5rem; text-align: center; font-size: 0.75rem; color: var(--sub); display: flex; align-items: center; justify-content: center; gap: 5px; opacity: 0.8; }
        .heart { color: #f85149; width: 12px; height: 12px; fill: currentColor; }
        .icon { width: 18px; height: 18px; fill: currentColor; }
        .footer-link { color: inherit; text-decoration: none; font-weight: 600; }
        .footer-link:hover { color: var(--primary); text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-title"><h1>Bing Bong</h1><p>Version 1.0</p></div>
        <button class="theme-toggle" onclick="toggleT()" id="t-btn"></button>
    </header>
    <div class="labels" id="labels"></div>
    <div class="sequencer" id="sequencer"></div>
    <div class="controls">
        <div class="playback-group">
            <button class="btn-play" onclick="preview()"><svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>Play</button>
            <button class="btn-stop" onclick="stop()"><svg class="icon" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>Stop</button>
        </div>
        <button class="btn-export" onclick="exportW()"><svg class="icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>Export</button>
    </div>
</div>

<footer>
    Unfortunately Vibe Coded with <svg class="heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg> by <a href="https://traderhowell.com" target="_blank" class="footer-link">TraderHowell</a>
</footer>

<script>
    const notes = ["G4", "A4", "B4", "C5", "C#5", "D5", "D#5", "E5"],
          freqs = [392, 440, 493.88, 523.25, 554.37, 587.33, 622.25, 659.25],
          ctx = new (window.AudioContext || window.webkitAudioContext)(),
          nodes = [], tOuts = [], mq = window.matchMedia('(prefers-color-scheme: light)');

    [5, 2, 0].forEach((v, i) => {
        document.getElementById('labels').innerHTML += `<span class="note-name" id="l-${i}">${notes[v]}</span>`;
        document.getElementById('sequencer').innerHTML += `
            <div class="channel ${i>1?'muted':''}" id="c-${i}">
                <div class="slider-wrap"><input type="range" class="pitch-slider" id="p-${i}" min="0" max="7" value="${v}" oninput="upd(${i})" onpointerup="play(ctx, freqs[value], ctx.currentTime)"></div>
                <label class="chk-wrap"><input type="checkbox" id="k-${i}" ${i<2?'checked':''} onchange="upd(${i})"><svg class="chk-icon" viewBox="0 0 24 24"><path id="i-${i}" d=""/></svg></label>
            </div>`;
    });

    const upd = (i) => {
        const v = document.getElementById(`p-${i}`).value, k = document.getElementById(`k-${i}`).checked;
        document.getElementById(`l-${i}`).innerText = notes[v];
        document.getElementById(`c-${i}`).classList.toggle('muted', !k);
        document.getElementById(`i-${i}`).setAttribute('d', k ? "M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.4-1.4 3.6 3.6 7.6-7.6L19 8l-9 9z" : "M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z");
    };
    [0,1,2].forEach(upd);

    const toggleT = (isL = !document.body.classList.contains('light-mode')) => {
        document.body.classList.toggle('light-mode', isL);
        document.getElementById('t-btn').innerHTML = isL ? `<svg class="icon" viewBox="0 0 24 24"><path d="M12 7c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zM2 13h2c.6 0 1-.4 1-1s-.4-1-1-1H2c-.6 0-1 .4-1 1s.4 1 1 1zm18 0h2c.6 0 1-.4 1-1s-.4-1-1-1h-2c-.6 0-1 .4-1 1s.4 1 1 1zM11 2v2c0 .6.4 1 1 1s1-.4 1-1V2c0-.6-.4-1-1-1s-1 .4-1 1zm0 18v2c0 .6.4 1 1 1s1-.4 1-1v-2c0-.6-.4-1-1-1s-1 .4-1 1zM6 4.6a1 1 0 00-1.4 0l1 1c.4.4 1 .4 1.4 0s.4-1 0-1.4L6 4.6zm12.4 12.4a1 1 0 00-1.4 0l1 1c.4.4 1 .4 1.4 0s.4-1 0-1.4l-1-1z"/></svg>` : `<svg class="icon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.5 0-.9-.1-1.4a5.4 5.4 0 0 1-7.5-7.5c-.5 0-.9-.1-1.4-.1z"/></svg>`;
    };
    toggleT(mq.matches); mq.addEventListener('change', e => toggleT(e.matches));

    const play = (c, f, s) => {
        const osc = c.createOscillator(), g = c.createGain(), h = c.createBiquadFilter(), l = c.createBiquadFilter();
        h.type = "highpass"; h.frequency.value = 300; l.type = "lowpass"; l.frequency.value = 4000;
        osc.type = "sine"; osc.frequency.setValueAtTime(f, s);
        g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(0.4, s + 0.05);
        g.gain.exponentialRampToValueAtTime(0.012, s + 0.95); g.gain.exponentialRampToValueAtTime(0.0001, s + 2);
        osc.connect(h).connect(l).connect(g).connect(c.destination);
        osc.start(s); osc.stop(s + 3); nodes.push(osc);
    };

    const stop = () => {
        nodes.forEach(n => { try{ n.stop() }catch(e){} }); nodes.length = 0;
        tOuts.forEach(clearTimeout); tOuts.length = 0;
        document.querySelectorAll('.note-name').forEach(n => n.classList.remove('highlight'));
    };

    const preview = () => {
        stop(); const now = ctx.currentTime;
        [0,1,2].forEach(i => {
            tOuts.push(setTimeout(() => {
                document.querySelectorAll('.note-name').forEach(n => n.classList.remove('highlight'));
                document.getElementById(`l-${i}`).classList.add('highlight');
            }, i * 1000));
            if(document.getElementById(`k-${i}`).checked) play(ctx, freqs[document.getElementById(`p-${i}`).value], now + i);
        });
        tOuts.push(setTimeout(stop, 3000));
    };

    const exportW = async () => {
        const act = [0,1,2].filter(i => document.getElementById(`k-${i}`).checked);
        if(!act.length) return;
        const sr = 44100, oCtx = new OfflineAudioContext(1, sr * ((act[act.length-1] * 1.0) + 2.2), sr);
        act.forEach(i => play(oCtx, freqs[document.getElementById(`p-${i}`).value], i));
        const buf = await oCtx.startRendering(), smp = buf.getChannelData(0), b = new ArrayBuffer(44 + smp.length * 2), v = new DataView(b);
        const wS = (o, s) => { for(let i=0; i<s.length; i++) v.setUint8(o+i, s.charCodeAt(i)); };
        wS(0, 'RIFF'); v.setUint32(4, 36 + smp.length * 2, true); wS(8, 'WAVE'); wS(12, 'fmt ');
        v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
        v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true); v.setUint16(32, 2, true);
        v.setUint16(34, 16, true); wS(36, 'data'); v.setUint32(40, smp.length * 2, true);
        for (let i = 0, o = 44; i < smp.length; i++, o += 2) {
            let s = Math.max(-1, Math.min(1, smp[i]));
            v.setInt16(o, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([b], {type:'audio/wav'})); a.download = act.map(i => notes[document.getElementById(`p-${i}`).value]).join('-') + ".wav"; a.click();
    };
</script>
</body>
</html>
